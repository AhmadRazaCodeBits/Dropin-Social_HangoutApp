steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=replace_with_google_maps_api_key'
      - '--build-arg'
      - 'NEXT_PUBLIC_PUSHER_KEY=replace_with_pusher_key'
      - '--build-arg'
      - 'NEXT_PUBLIC_PUSHER_CLUSTER=ap2'
      - '--build-arg'
      - 'NEXT_PUBLIC_MAPTILER_KEY=replace_with_maptiler_key'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dropin:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dropin:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dropin:latest'
